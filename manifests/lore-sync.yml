# Scaffolded by `lore init`. Daily context sync — this is a standalone lore
# context repo (no CI, no deploys, no protection), so commits go straight to
# the default branch.
# Secrets (repo or org level):
#   SLACK_TOKEN        — the lore bot's xoxb- token (required)
#   ANTHROPIC_API_KEY  — enables the extract step (derived artifacts + weekly
#                        report); omit it and sync still runs, extract is skipped
name: lore sync

on:
  schedule:
    - cron: '23 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency: lore-sync

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Sync
        env:
          SLACK_TOKEN: ${{ secrets.SLACK_TOKEN }}
        run: npx --yes github:nerdburn/lore sync

      - name: Extract
        if: ${{ secrets.ANTHROPIC_API_KEY != '' }}
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: npx --yes github:nerdburn/lore extract

      - name: Commit and push
        run: |
          git config user.name "lore"
          git config user.email "lore@users.noreply.github.com"
          git add context/ state.json
          git diff --cached --quiet || git commit -m "chore(lore): sync"
          git push
